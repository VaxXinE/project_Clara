name: clara-prod

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clara_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-clara_db}
    volumes:
      - clara_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - clara_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: clara-backend/Dockerfile.prod
    image: clara-backend:prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../clara-backend/.env.prod
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-clara_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-clara_db}
      REDIS_URL: redis://redis:6379/0
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    command: ["/bin/sh", "/app/infra/docker/backend-entrypoint.sh"]
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import json, sys, urllib.request
          with urllib.request.urlopen("http://127.0.0.1:8000/health") as response:
              payload = json.loads(response.read().decode())
          sys.exit(0 if payload.get("status") == "ok" else 1)
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 10

  dashboard:
    build:
      context: ../clara-dashboard
      dockerfile: Dockerfile.prod
    image: clara-dashboard:prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - ../clara-dashboard/.env.production
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - |
          fetch("http://127.0.0.1:3000/login").then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  clara_postgres_data:
  clara_redis_data:
