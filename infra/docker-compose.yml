name: clara

services:
  postgres:
    image: postgres:16
    container_name: clara_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clara_user
      POSTGRES_PASSWORD: clara_password_dev_only
      POSTGRES_DB: clara_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - clara_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: clara_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - clara_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../clara-backend
      dockerfile: Dockerfile
    image: clara-backend:dev
    container_name: clara_backend
    restart: unless-stopped
    working_dir: /workspace/clara-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../clara-backend/.env.docker
    environment:
      DATABASE_URL: postgresql+psycopg://clara_user:clara_password_dev_only@postgres:5432/clara_db
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://192.168.1.146:3000
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "192.168.1.146:8000:8000"
    volumes:
      - ../clara-backend:/workspace/clara-backend
      - ../clara_knowledge:/workspace/clara_knowledge:ro
      - clara_backend_venv:/workspace/clara-backend/.venv
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        uv sync --frozen
        uv run alembic upgrade head
        uv run python scripts/bootstrap_owner.py
        uv run python scripts/import_clara_knowledge.py
        uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import sys, urllib.request; sys.exit(0 if urllib.request.urlopen("http://127.0.0.1:8000/health").status == 200 else 1)
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 10

  dashboard:
    build:
      context: ../clara-dashboard
      dockerfile: Dockerfile
    image: clara-dashboard:dev
    container_name: clara_dashboard
    restart: unless-stopped
    working_dir: /app
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_CSRF_COOKIE_NAME: clara_csrf_token
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "1"
      WATCHPACK_POLLING: "true"
    ports:
      - "192.168.1.146:3000:3000"
    volumes:
      - ../clara-dashboard:/app
      - clara_dashboard_node_modules:/app/node_modules
      - clara_dashboard_next:/app/.next
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        [ -d node_modules/next ] || npm ci
        npm run dev -- --hostname 0.0.0.0 --port 3000
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - |
          fetch("http://127.0.0.1:3000/login").then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  clara_postgres_data:
  clara_redis_data:
  clara_backend_venv:
  clara_dashboard_node_modules:
  clara_dashboard_next:
